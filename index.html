<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeBlock | Mission Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #080c1a;
            --panel-bg: rgba(8, 12, 26, 0.85);
            --accent-indigo: #6366f1;
            --accent-purple: #a855f7;
            --text-primary: #e2e8f0;
            --text-muted: #4a6080;
            --text-faint: #334155;
            --border-subtle: rgba(255, 255, 255, 0.05);
            --border-panel: #1e2a4a;
        }

        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0;
            font-family: 'Sora', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-primary);
            height: 100vh;
            display: flex; flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* --- GRADIENT DOTS BACKGROUND (Vanilla Implementation) --- */
        .gradient-bg {
            position: absolute;
            inset: 0;
            z-index: -1;
            background-color: var(--bg-deep);
            /* Creating the dot pattern and the gradients */
            background-image: 
                radial-gradient(circle at center, transparent 1.5px, var(--bg-deep) 0 8px, transparent 8px),
                radial-gradient(circle at center, transparent 1.5px, var(--bg-deep) 0 8px, transparent 8px),
                radial-gradient(circle at 50% 50%, #f00, transparent 60%),
                radial-gradient(circle at 50% 50%, #ff0, transparent 60%),
                radial-gradient(circle at 50% 50%, #0f0, transparent 60%),
                radial-gradient(ellipse at 50% 50%, #00f, transparent 60%);
            background-size: 
                10px 17.32px, 10px 17.32px, 
                200% 200%, 200% 200%, 200% 200%, 200% 17.32px;
            background-position: 
                0px 0px, 5px 8.66px, 0% 0%, 0% 0%, 0% 0%, 0% 0px;
            animation: moveGradient 20s linear infinite, colorCycle 6s linear infinite;
        }

        @keyframes moveGradient {
            0% { background-position: 0px 0px, 5px 8.66px, 0% 0%, 0% 0%, 0% 0%, 0% 0px; }
            100% { background-position: 0px 0px, 5px 8.66px, 800% 400%, 1000% -400%, -1200% -600%, 400% 17.32px; }
        }

        @keyframes colorCycle {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }

        /* --- UI Components --- */
        header {
            height: 60px; padding: 0 20px;
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(8, 12, 26, 0.4);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-subtle);
            z-index: 20;
        }

        .logo-box {
            width: 34px; height: 34px;
            background: linear-gradient(135deg, var(--accent-indigo), var(--accent-purple), #ec4899);
            border-radius: 8px; display: flex; align-items: center; justify-content: center;
            font-size: 18px; box-shadow: 0 4px 16px rgba(99, 102, 241, 0.4);
        }

        #grid-container { 
            flex: 1; display: flex; overflow-x: auto; 
            mask-image: linear-gradient(to right, transparent, black 5%, black 95%, transparent);
        }
        
        .hour-col { position: relative; flex-shrink: 0; display: flex; flex-direction: column; border-right: 1px solid var(--border-subtle); }
        .col-header { 
            padding: 12px 10px; font-size: 11px; font-weight: 700; 
            color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;
        }

        .drop-zone { flex: 1; padding: 8px; display: flex; flex-direction: column; gap: 6px; }
        .drop-zone.drag-hover { background: rgba(99, 102, 241, 0.15); }

        .task-bubble {
            padding: 10px 12px; border-radius: 10px; font-size: 11px; font-weight: 700;
            color: white; cursor: grab; user-select: none;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.2s;
        }
        .task-bubble.dragging { opacity: 0; }

        footer {
            height: 100px; background: var(--panel-bg); backdrop-filter: blur(24px);
            border-top: 1px solid var(--border-subtle);
            display: flex; align-items: center; padding: 0 20px; gap: 20px; z-index: 20;
        }

        #dock-items { display: flex; gap: 12px; overflow-x: auto; flex: 1; align-items: center; }

        .input-pill {
            background: #0d1528; border: 1px solid var(--border-panel);
            border-radius: 16px; padding: 8px 16px;
            display: flex; align-items: center; gap: 16px;
        }
        .input-pill input {
            background: transparent; border: none; outline: none;
            color: white; font-family: inherit; font-size: 13px; width: 160px;
        }

        .btn-add-main {
            border: 2px dashed var(--border-panel); background: transparent;
            color: var(--text-muted); padding: 10px 22px; border-radius: 100px;
            font-weight: 700; cursor: pointer;
        }

        .resize-handle { position: absolute; right: -5px; top: 0; width: 10px; height: 100%; cursor: col-resize; z-index: 10; display: flex; align-items: center; justify-content: center; }
        .handle-bar { width: 1px; height: 30%; background: var(--border-panel); opacity: 0.5; }
    </style>
</head>
<body>

<div class="gradient-bg"></div>

<header>
    <div style="display: flex; align-items: center; gap: 12px;">
        <div class="logo-box">⏱</div>
        <div>
            <div style="font-weight: 800; font-size: 17px; letter-spacing: -0.5px;">TimeBlock</div>
        </div>
    </div>
    <div id="stats" style="font-size: 10px; font-weight: 800; color: var(--text-muted); border: 1px solid var(--border-panel); padding: 4px 12px; border-radius: 20px;">0 / 0 PLACED</div>
</header>

<main id="grid-container"></main>

<footer>
    <div id="dock-items"></div>
</footer>

<script>
    const COLORS = [
        {bg: 'rgba(244, 63, 94, 0.7)', glow: 'rgba(244, 63, 94, 0.4)'},
        {bg: 'rgba(59, 130, 246, 0.7)', glow: 'rgba(59, 130, 246, 0.4)'},
        {bg: 'rgba(16, 185, 129, 0.7)', glow: 'rgba(16, 185, 129, 0.4)'}
    ];

    let state = {
        widths: Array(24).fill(140),
        tasks: [],
        isEditing: false,
        activeColorIdx: 0,
        tempName: ''
    };

    function initGrid() {
        const grid = document.getElementById('grid-container');
        grid.innerHTML = '';
        for (let i = 0; i < 24; i++) {
            const col = document.createElement('div');
            col.className = 'hour-col';
            col.id = `col-${i}`;
            col.style.width = `${state.widths[i]}px`;

            const hLabel = i === 0 ? '12 AM' : (i < 12 ? i + ' AM' : (i === 12 ? '12 PM' : (i-12) + ' PM'));
            col.innerHTML = `<div class="col-header">${hLabel}</div>`;

            const dz = document.createElement('div');
            dz.className = 'drop-zone';
            dz.dataset.hour = i;
            dz.ondragover = (e) => { e.preventDefault(); dz.classList.add('drag-hover'); };
            dz.ondragleave = () => dz.classList.remove('drag-hover');
            dz.ondrop = (e) => {
                e.preventDefault();
                dz.classList.remove('drag-hover');
                updateTaskPos(e.dataTransfer.getData('text/plain'), i);
            };

            col.appendChild(dz);
            if (i < 23) {
                const h = document.createElement('div');
                h.className = 'resize-handle';
                h.innerHTML = '<div class="handle-bar"></div>';
                h.onmousedown = (e) => setupResize(e, i);
                col.appendChild(h);
            }
            grid.appendChild(col);
        }
    }

    function syncUI() {
        document.querySelectorAll('.drop-zone').forEach(dz => dz.innerHTML = '');
        const dock = document.getElementById('dock-items');
        dock.innerHTML = '';

        state.tasks.forEach(t => {
            const el = document.createElement('div');
            el.className = 'task-bubble';
            el.innerText = t.name;
            el.style.backgroundColor = t.color.bg;
            el.draggable = true;
            el.ondragstart = (e) => {
                e.dataTransfer.setData('text/plain', t.id);
                setTimeout(() => el.classList.add('dragging'), 0);
            };
            el.ondragend = () => el.classList.remove('dragging');

            if (t.hour !== null) {
                document.querySelector(`.drop-zone[data-hour="${t.hour}"]`).appendChild(el);
            } else {
                dock.appendChild(el);
            }
        });

        if (state.isEditing) {
            renderInput(dock);
        } else {
            const btn = document.createElement('button');
            btn.className = 'btn-add-main';
            btn.innerText = '+ Add Task';
            btn.onclick = () => { state.isEditing = true; syncUI(); };
            dock.appendChild(btn);
        }
        document.getElementById('stats').innerText = `${state.tasks.filter(t => t.hour !== null).length} / ${state.tasks.length} PLACED`;
    }

    function renderInput(container) {
        const p = document.createElement('div');
        p.className = 'input-pill';
        p.innerHTML = `<input id="tin" placeholder="Task..." value="${state.tempName}"><button onclick="addTask()">Add</button>`;
        container.appendChild(p);
        const tin = document.getElementById('tin');
        tin.focus();
        tin.oninput = (e) => state.tempName = e.target.value;
        tin.onkeydown = (e) => { if(e.key === 'Enter') addTask(); };
    }

    function addTask() {
        if (!state.tempName) return;
        state.tasks.push({ id: 't'+Date.now(), name: state.tempName, hour: null, color: COLORS[state.tasks.length % COLORS.length] });
        state.tempName = ''; state.isEditing = false;
        syncUI();
    }

    function updateTaskPos(id, hour) {
        const t = state.tasks.find(x => x.id === id);
        if (t) { t.hour = hour; syncUI(); }
    }

    function setupResize(e, index) {
        const startX = e.clientX;
        const w0 = state.widths[index];
        const w1 = state.widths[index+1];
        const total = w0 + w1;
        const onMove = (me) => {
            const dx = me.clientX - startX;
            const nw0 = Math.max(70, Math.min(total - 70, w0 + dx));
            state.widths[index] = nw0; state.widths[index+1] = total - nw0;
            document.getElementById(`col-${index}`).style.width = nw0 + 'px';
            document.getElementById(`col-${index+1}`).style.width = (total - nw0) + 'px';
        };
        const onUp = () => { window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp); };
        window.addEventListener('mousemove', onMove); window.addEventListener('mouseup', onUp);
    }

    initGrid();
    syncUI();
</script>
</body>
</html>
