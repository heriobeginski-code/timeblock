<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeBlock | Mission Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #080c1a;
            --panel-bg: rgba(8, 12, 26, 0.9);
            --accent-indigo: #6366f1;
            --text-primary: #e2e8f0;
            --text-muted: #4a6080;
            --border-subtle: rgba(255, 255, 255, 0.05);
            --border-panel: #1e2a4a;
        }

        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0;
            font-family: 'Sora', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-primary);
            height: 100vh;
            display: flex; flex-direction: column;
            overflow: hidden;
        }

        .gradient-bg {
            position: absolute; inset: 0; z-index: -1;
            background-image: 
                radial-gradient(circle at center, transparent 1.5px, var(--bg-deep) 0 8px, transparent 8px),
                radial-gradient(circle at 50% 50%, #f00, transparent 60%),
                radial-gradient(circle at 50% 50%, #0f0, transparent 60%),
                radial-gradient(ellipse at 50% 50%, #00f, transparent 60%);
            background-size: 10px 17.32px, 200% 200%, 200% 200%, 200% 17.32px;
            animation: moveGradient 20s linear infinite, colorCycle 6s linear infinite;
        }
        @keyframes moveGradient { 
            0% { background-position: 0px 0px, 0% 0%, 0% 0%, 0% 0px; }
            100% { background-position: 0px 0px, 800% 400%, -1200% -600%, 400% 17.32px; }
        }
        @keyframes colorCycle { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }

        /* --- TASK BUBBLE --- */
        .task-bubble {
            position: relative;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 700;
            color: white;
            cursor: grab;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: transform 0.2s;
            backdrop-filter: blur(8px) url("#container-glass");
            box-shadow: inset 2px 2px 2px rgba(255,255,255,0.2), 0 4px 10px rgba(0,0,0,0.3);
            min-width: 100px;
        }

        .delete-btn {
            background: rgba(255, 255, 255, 0.15);
            border: none;
            color: white;
            font-size: 10px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: 10px;
            transition: background 0.2s;
        }
        .delete-btn:hover { background: #f43f5e; }

        /* --- GRID --- */
        header { height: 60px; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; background: rgba(8, 12, 26, 0.4); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border-subtle); z-index: 20; }
        #grid-container { flex: 1; display: flex; overflow-x: auto; padding: 0 10px; background: transparent; }
        .hour-col { position: relative; flex-shrink: 0; display: flex; flex-direction: column; border-right: 1px solid var(--border-subtle); }
        .col-header { padding: 15px 10px; font-size: 10px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; }
        .drop-zone { flex: 1; padding: 10px; display: flex; flex-direction: column; gap: 8px; min-height: 100px; }
        .drop-zone.drag-hover { background: rgba(99, 102, 241, 0.1); }

        /* --- DOCK --- */
        footer { height: 100px; background: var(--panel-bg); backdrop-filter: blur(20px); border-top: 1px solid var(--border-subtle); display: flex; align-items: center; padding: 0 30px; gap: 20px; z-index: 20; }
        #dock-items { display: flex; gap: 12px; overflow-x: auto; flex: 1; align-items: center; }

        .btn-add { background: rgba(255,255,255,0.05); border: 1px dashed var(--text-muted); color: var(--text-muted); padding: 10px 20px; border-radius: 50px; font-weight: 700; cursor: pointer; }
        .input-pill { background: #0d1528; border: 1px solid var(--border-panel); border-radius: 12px; padding: 8px 15px; display: flex; gap: 10px; align-items: center; }
        .input-pill input { background: transparent; border: none; outline: none; color: white; width: 140px; }

        .resize-handle { position: absolute; right: -5px; top: 0; width: 10px; height: 100%; cursor: col-resize; z-index: 10; }
    </style>
</head>
<body>

<svg class="hidden" style="position: absolute; width: 0; height: 0;">
    <defs>
        <filter id="container-glass"><feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="1" result="noise"/><feDisplacementMap in="SourceGraphic" in2="noise" scale="10" xChannelSelector="R" yChannelSelector="G"/></filter>
    </defs>
</svg>

<div class="gradient-bg"></div>

<header>
    <div style="font-weight: 800; font-size: 18px;">TIMEBLOCK</div>
    <div id="stats" style="font-size: 10px; font-weight: 800; opacity: 0.6;">0 / 0 PLACED</div>
</header>

<main id="grid-container"></main>

<footer>
    <div id="dock-items"></div>
</footer>

<script>
    const COLORS = [
        {bg: 'rgba(99, 102, 241, 0.6)'},
        {bg: 'rgba(168, 85, 247, 0.6)'},
        {bg: 'rgba(236, 72, 153, 0.6)'},
        {bg: 'rgba(16, 185, 129, 0.6)'}
    ];

    let state = {
        widths: Array(24).fill(160),
        tasks: [],
        isEditing: false
    };

    // --- STORAGE ---
    function save() {
        const data = {
            tasks: state.tasks,
            widths: state.widths,
            date: new Date().toDateString()
        };
        localStorage.setItem('TIMEBLOCK_VERIFIED_V1', JSON.stringify(data));
        console.log("State Saved.");
    }

    function load() {
        const raw = localStorage.getItem('TIMEBLOCK_VERIFIED_V1');
        if (raw) {
            const data = JSON.parse(raw);
            const today = new Date().toDateString();
            if (data.date === today) {
                state.tasks = data.tasks || [];
            } else {
                state.tasks = []; // Midnight Reset
            }
            state.widths = data.widths || Array(24).fill(160);
        }
    }

    // --- RENDER ---
    function initGrid() {
        const container = document.getElementById('grid-container');
        container.innerHTML = '';
        for (let i = 0; i < 24; i++) {
            const col = document.createElement('div');
            col.className = 'hour-col';
            col.style.width = `${state.widths[i]}px`;
            
            const h = i === 0 ? '12 AM' : (i < 12 ? i + ' AM' : (i === 12 ? '12 PM' : (i-12) + ' PM'));
            col.innerHTML = `<div class="col-header">${h}</div>`;
            
            const dz = document.createElement('div');
            dz.className = 'drop-zone';
            dz.dataset.hour = i;
            dz.ondragover = (e) => { e.preventDefault(); dz.classList.add('drag-hover'); };
            dz.ondragleave = () => dz.classList.remove('drag-hover');
            dz.ondrop = (e) => {
                e.preventDefault();
                dz.classList.remove('drag-hover');
                const id = e.dataTransfer.getData('text/plain');
                moveTask(id, i);
            };
            
            col.appendChild(dz);
            container.appendChild(col);
        }
    }

    function syncUI() {
        document.querySelectorAll('.drop-zone').forEach(dz => dz.innerHTML = '');
        const dock = document.getElementById('dock-items');
        dock.innerHTML = '';

        state.tasks.forEach(t => {
            const el = document.createElement('div');
            el.className = 'task-bubble';
            el.style.backgroundColor = t.color.bg;
            el.draggable = true;
            el.innerHTML = `<span>${t.name}</span>`;
            
            const del = document.createElement('button');
            del.className = 'delete-btn';
            del.innerHTML = '✕';
            del.onclick = (e) => { e.stopPropagation(); removeTask(t.id); };
            el.appendChild(del);

            el.ondragstart = (e) => {
                e.dataTransfer.setData('text/plain', t.id);
                el.style.opacity = '0.4';
            };
            el.ondragend = () => el.style.opacity = '1';

            if (t.hour !== null) {
                const zone = document.querySelector(`.drop-zone[data-hour="${t.hour}"]`);
                if (zone) zone.appendChild(el);
            } else {
                dock.appendChild(el);
            }
        });

        if (state.isEditing) {
            const p = document.createElement('div');
            p.className = 'input-pill';
            p.innerHTML = `<input id="task-name" placeholder="Task Name..."><button onclick="confirmTask()" style="background:var(--accent-indigo); border:none; color:white; padding:5px 10px; border-radius:6px; cursor:pointer;">Add</button>`;
            dock.appendChild(p);
            const input = document.getElementById('task-name');
            input.focus();
            input.onkeydown = (e) => { if(e.key === 'Enter') confirmTask(); };
        } else {
            const addBtn = document.createElement('button');
            addBtn.className = 'btn-add';
            addBtn.innerText = '+ NEW TASK';
            addBtn.onclick = () => { state.isEditing = true; syncUI(); };
            dock.appendChild(addBtn);
        }

        document.getElementById('stats').innerText = `${state.tasks.filter(t => t.hour !== null).length} / ${state.tasks.length} PLACED`;
        save();
    }

    function confirmTask() {
        const val = document.getElementById('task-name').value;
        if (!val) return;
        state.tasks.push({
            id: 'id-' + Date.now(),
            name: val,
            hour: null,
            color: COLORS[state.tasks.length % COLORS.length]
        });
        state.isEditing = false;
        syncUI();
    }

    function moveTask(id, hour) {
        const t = state.tasks.find(x => x.id === id);
        if (t) { t.hour = hour; syncUI(); }
    }

    function removeTask(id) {
        state.tasks = state.tasks.filter(t => t.id !== id);
        syncUI();
    }

    // --- START ---
    load();
    initGrid();
    syncUI();
</script>
</body>
</html>
