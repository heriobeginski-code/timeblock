<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeBlock | Mission Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #080c1a;
            --accent: #6366f1;
            --text: #e2e8f0;
            --border: #0f172a;
        }
        * { box-sizing: border-box; }
        body { 
            margin: 0; font-family: 'Sora', sans-serif; background: var(--bg-deep); 
            color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; 
        }

        /* Header & Dock Styles */
        header { height: 60px; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
        footer { height: 80px; background: rgba(8,12,26,0.95); border-top: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; gap: 20px; }
        
        /* Grid Layout */
        #grid-container { flex: 1; display: flex; overflow-x: auto; overflow-y: hidden; }
        .hour-col { position: relative; flex-shrink: 0; display: flex; flex-direction: column; border-right: 1px solid var(--border); height: 100%; transition: background 0.2s; }
        .col-header { padding: 8px 10px; font-size: 11px; pointer-events: none; }
        
        /* Drop Zone Logic */
        .drop-zone { flex: 1; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        /* Prevent child elements from stealing the drag event */
        .drop-zone * { pointer-events: none; } 
        .drop-zone.drag-hover { background: rgba(99, 102, 241, 0.1); border: 2px dashed var(--accent); }

        /* Bubbles */
        .task-bubble { 
            padding: 8px 12px; border-radius: 8px; font-size: 11px; font-weight: 600; 
            cursor: pointer; pointer-events: auto !important; 
        }
        .dock-bubble { 
            padding: 10px 20px; border-radius: 100px; font-size: 13px; font-weight: 700; 
            cursor: grab; white-space: nowrap; 
        }
        .dragging { opacity: 0.3; }

        /* Resize Handle */
        .resize-handle { 
            position: absolute; right: -5px; top: 0; width: 10px; height: 100%; 
            cursor: col-resize; z-index: 10; display: flex; align-items: center; justify-content: center; 
        }
        .handle-bar { width: 2px; height: 40px; background: #1e2a4a; border-radius: 2px; }
        .resize-handle:hover .handle-bar { background: var(--accent); width: 4px; }

        #dock-items { display: flex; gap: 12px; overflow-x: auto; align-items: center; flex: 1; }
        .btn-add { border: 2px dashed #1e2a4a; background: transparent; color: #4a6080; padding: 8px 16px; border-radius: 100px; cursor: pointer; font-family: inherit; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: 800; font-size: 18px;">⏱ TimeBlock</div>
    <div id="stats" style="font-size: 11px; color: #4a6080;">0 Tasks</div>
</header>

<main id="grid-container"></main>

<footer>
    <div style="font-size: 9px; letter-spacing: 1px; color: #1e3050; font-weight: 800;">TASKS</div>
    <div id="dock-items"></div>
    <button class="btn-add" onclick="createNewTask()">+ New Task</button>
</footer>

<script>
    const state = {
        widths: Array(24).fill(120),
        tasks: [],
        draggingId: null
    };

    const COLORS = ['#f43f5e', '#3b82f6', '#10b981', '#f59e0b', '#a855f7'];

    // 1. INITIALIZE THE GRID ONCE (Persistent DOM)
    function initGrid() {
        const container = document.getElementById('grid-container');
        for (let i = 0; i < 24; i++) {
            const col = document.createElement('div');
            col.className = 'hour-col';
            col.id = `col-${i}`;
            col.style.width = `${state.widths[i]}px`;

            const label = i === 0 ? '12 AM' : (i < 12 ? i + ' AM' : (i === 12 ? '12 PM' : (i-12) + ' PM'));
            col.innerHTML = `<div class="col-header">${label}</div>`;

            const dz = document.createElement('div');
            dz.className = 'drop-zone';
            dz.dataset.hour = i;

            // Drag Events
            dz.ondragover = (e) => { e.preventDefault(); dz.classList.add('drag-hover'); };
            dz.ondragleave = () => dz.classList.remove('drag-hover');
            dz.ondrop = (e) => {
                dz.classList.remove('drag-hover');
                const taskId = e.dataTransfer.getData('text/plain');
                moveTask(taskId, i);
            };

            col.appendChild(dz);

            if (i < 23) {
                const handle = document.createElement('div');
                handle.className = 'resize-handle';
                handle.innerHTML = '<div class="handle-bar"></div>';
                handle.onmousedown = (e) => initResize(e, i);
                col.appendChild(handle);
            }

            container.appendChild(col);
        }
    }

    // 2. TARGETED TASK RENDERING (Doesn't touch the columns)
    function syncTasks() {
        // Clear all drop zones and dock
        document.querySelectorAll('.drop-zone').forEach(dz => dz.innerHTML = '');
        const dock = document.getElementById('dock-items');
        dock.innerHTML = '';

        state.tasks.forEach(task => {
            const el = document.createElement('div');
            el.innerText = task.name;
            el.style.backgroundColor = task.color;

            if (task.hour !== null) {
                el.className = 'task-bubble';
                document.querySelector(`.drop-zone[data-hour="${task.hour}"]`).appendChild(el);
            } else {
                el.className = 'dock-bubble';
                el.draggable = true;
                el.ondragstart = (e) => {
                    e.dataTransfer.setData('text/plain', task.id);
                    setTimeout(() => el.classList.add('dragging'), 0);
                };
                el.ondragend = () => el.classList.remove('dragging');
                dock.appendChild(el);
            }
        });
        document.getElementById('stats').innerText = `${state.tasks.length} Tasks Created`;
    }

    function moveTask(id, hour) {
        const task = state.tasks.find(t => t.id == id);
        if (task) {
            task.hour = hour;
            syncTasks();
        }
    }

    function createNewTask() {
        const name = prompt("Task Name?");
        if (!name) return;
        state.tasks.push({
            id: Date.now(),
            name: name,
            hour: null,
            color: COLORS[state.tasks.length % COLORS.length]
        });
        syncTasks();
    }

    function initResize(e, index) {
        const startX = e.clientX;
        const startWidthL = state.widths[index];
        const startWidthR = state.widths[index+1];
        const total = startWidthL + startWidthR;

        const onMouseMove = (moveE) => {
            const delta = moveE.clientX - startX;
            const newL = Math.max(70, Math.min(total - 70, startWidthL + delta));
            const newR = total - newL;

            state.widths[index] = newL;
            state.widths[index+1] = newR;

            document.getElementById(`col-${index}`).style.width = `${newL}px`;
            document.getElementById(`col-${index+1}`).style.width = `${newR}px`;
        };

        const onMouseUp = () => {
            window.removeEventListener('mousemove', onMouseMove);
            window.removeEventListener('mouseup', onMouseUp);
        };

        window.addEventListener('mousemove', onMouseMove);
        window.addEventListener('mouseup', onMouseUp);
    }

    initGrid();
</script>
</body>
</html>
