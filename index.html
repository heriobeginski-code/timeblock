<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeBlock | Mission Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #080c1a;
            --panel-bg: rgba(8, 12, 26, 0.9);
            --accent-indigo: #6366f1;
            --text-primary: #e2e8f0;
            --text-muted: #4a6080;
            --border-subtle: rgba(255, 255, 255, 0.05);
            --border-panel: #1e2a4a;
        }

        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0;
            font-family: 'Sora', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-primary);
            height: 100vh;
            display: flex; flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* --- BACKGROUND --- */
        .gradient-bg {
            position: absolute; inset: 0; z-index: -1;
            background-image: 
                radial-gradient(circle at center, transparent 1.5px, var(--bg-deep) 0 8px, transparent 8px),
                radial-gradient(circle at 50% 50%, #f00, transparent 60%),
                radial-gradient(circle at 50% 50%, #0f0, transparent 60%),
                radial-gradient(ellipse at 50% 50%, #00f, transparent 60%);
            background-size: 10px 17.32px, 200% 200%, 200% 200%, 200% 17.32px;
            animation: moveGradient 20s linear infinite, colorCycle 6s linear infinite;
        }
        @keyframes moveGradient { 
            0% { background-position: 0px 0px, 0% 0%, 0% 0%, 0% 0px; }
            100% { background-position: 0px 0px, 800% 400%, -1200% -600%, 400% 17.32px; }
        }
        @keyframes colorCycle { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }

        /* --- RESTORED LIQUID GLASS BUBBLE --- */
        .task-bubble {
            position: relative;
            padding: 12px 16px;
            border-radius: 14px;
            font-size: 11px;
            font-weight: 700;
            color: white;
            cursor: grab;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: transform 0.2s, filter 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden; /* Clips the glass filter */
        }

        /* The "Liquid" Layer */
        .task-bubble::before {
            content: "";
            position: absolute;
            inset: 0;
            z-index: -1;
            backdrop-filter: blur(10px) url("#container-glass");
            background-color: inherit; /* Takes the task color */
            opacity: 0.85;
        }

        /* The "Glass Depth" Layer */
        .task-bubble::after {
            content: "";
            position: absolute;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            box-shadow: 
                inset 3px 3px 1px -2px rgba(255,255,255,0.4),
                inset -2px -2px 2px -1px rgba(0,0,0,0.4),
                0 4px 12px rgba(0,0,0,0.3);
            border-radius: inherit;
        }

        .task-bubble span { z-index: 1; text-shadow: 0 1px 2px rgba(0,0,0,0.5); }

        .delete-btn {
            position: relative;
            z-index: 2;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            font-size: 9px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: 10px;
            transition: all 0.2s;
        }
        .delete-btn:hover { background: #f43f5e; transform: scale(1.1); }

        /* --- UI LAYOUT --- */
        header { height: 60px; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; background: rgba(8, 12, 26, 0.4); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border-subtle); z-index: 20; }
        #grid-container { flex: 1; display: flex; overflow-x: auto; padding: 0 10px; }
        .hour-col { position: relative; flex-shrink: 0; display: flex; flex-direction: column; border-right: 1px solid var(--border-subtle); }
        .col-header { padding: 15px 10px; font-size: 10px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .drop-zone { flex: 1; padding: 12px; display: flex; flex-direction: column; gap: 10px; min-height: 100px; }
        .drop-zone.drag-hover { background: rgba(99, 102, 241, 0.1); border-radius: 12px; }

        footer { height: 100px; background: var(--panel-bg); backdrop-filter: blur(30px); border-top: 1px solid var(--border-subtle); display: flex; align-items: center; padding: 0 30px; gap: 20px; z-index: 20; }
        #dock-items { display: flex; gap: 15px; overflow-x: auto; flex: 1; align-items: center; }

        .btn-add { background: rgba(255,255,255,0.05); border: 1px dashed var(--text-muted); color: var(--text-muted); padding: 10px 24px; border-radius: 50px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
        .btn-add:hover { border-color: white; color: white; }

        .input-pill { background: #0d1528; border: 1px solid var(--border-panel); border-radius: 12px; padding: 10px 15px; display: flex; gap: 10px; align-items: center; }
        .input-pill input { background: transparent; border: none; outline: none; color: white; width: 140px; font-family: inherit; }
    </style>
</head>
<body>

<svg class="hidden" style="position: absolute; width: 0; height: 0;">
    <defs>
        <filter id="container-glass">
            <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="1" result="noise"/>
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="12" xChannelSelector="R" yChannelSelector="G"/>
        </filter>
    </defs>
</svg>

<div class="gradient-bg"></div>

<header>
    <div style="font-weight: 800; font-size: 18px; letter-spacing: -1px;">TIMEBLOCK</div>
    <div id="stats" style="font-size: 10px; font-weight: 800; opacity: 0.6;">0 / 0 PLACED</div>
