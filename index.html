<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeBlock | Mission Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #080c1a;
            --panel-bg: rgba(8, 12, 26, 0.85);
            --accent-indigo: #6366f1;
            --text-primary: #e2e8f0;
            --text-muted: #4a6080;
            --border-subtle: rgba(255, 255, 255, 0.05);
            --border-panel: #1e2a4a;
        }

        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0;
            font-family: 'Sora', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-primary);
            height: 100vh;
            display: flex; flex-direction: column;
            overflow: hidden;
        }

        /* --- GRADIENT BACKGROUND --- */
        .gradient-bg {
            position: absolute; inset: 0; z-index: -1;
            background-image: 
                radial-gradient(circle at center, transparent 1.5px, var(--bg-deep) 0 8px, transparent 8px),
                radial-gradient(circle at 50% 50%, #f00, transparent 60%),
                radial-gradient(circle at 50% 50%, #0f0, transparent 60%),
                radial-gradient(ellipse at 50% 50%, #00f, transparent 60%);
            background-size: 10px 17.32px, 200% 200%, 200% 200%, 200% 17.32px;
            animation: moveGradient 20s linear infinite, colorCycle 6s linear infinite;
        }
        @keyframes moveGradient { 
            0% { background-position: 0px 0px, 0% 0%, 0% 0%, 0% 0px; }
            100% { background-position: 0px 0px, 800% 400%, -1200% -600%, 400% 17.32px; }
        }
        @keyframes colorCycle { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }

        /* --- LIQUID GLASS BUBBLE --- */
        .task-bubble {
            position: relative;
            padding: 12px 18px;
            border-radius: 14px;
            font-size: 11px;
            font-weight: 700;
            color: white;
            cursor: grab;
            user-select: none;
            border: none;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: transform 0.2s, filter 0.2s;
            box-shadow: 0 0 12px rgba(255,255,255,0.05);
        }

        .task-bubble::after {
            content: "";
            position: absolute;
            inset: 0;
            z-index: -1;
            border-radius: inherit;
            backdrop-filter: blur(8px) url("#container-glass");
            opacity: 0.9;
            box-shadow: 
                inset 2px 2px 0.5px -2px rgba(255,255,255,0.4),
                inset -2px -2px 0.5px -2px rgba(0,0,0,0.5);
        }

        .delete-btn {
            background: rgba(0,0,0,0.2);
            border: none;
            color: white;
            font-size: 10px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: 8px;
            transition: background 0.2s;
            z-index: 10;
        }
        .delete-btn:hover { background: rgba(244, 63, 94, 0.8); }

        /* --- LAYOUT --- */
        header { height: 60px; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; background: rgba(8, 12, 26, 0.4); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border-subtle); z-index: 20; }
        #grid-container { flex: 1; display: flex; overflow-x: auto; padding: 0 10px; }
        .hour-col { position: relative; flex-shrink: 0; display: flex; flex-direction: column; border-right: 1px solid var(--border-subtle); }
        .col-header { padding: 15px 10px; font-size: 10px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .drop-zone { flex: 1; padding: 10px; display: flex; flex-direction: column; gap: 10px; }
        .drop-zone.drag-hover { background: rgba(99, 102, 241, 0.15); border-radius: 12px; }

        footer { height: 100px; background: var(--panel-bg); backdrop-filter: blur(30px); border-top: 1px solid var(--border-subtle); display: flex; align-items: center; padding: 0 30px; gap: 20px; z-index: 20; }
        #dock-items { display: flex; gap: 15px; overflow-x: auto; flex: 1; align-items: center; height: 100%; }

        .btn-liquid-add {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-muted);
            padding: 12px 24px;
            border-radius: 100px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        .input-pill { background: #0d1528; border: 1px solid var(--border-panel); border-radius: 16px; padding: 10px 20px; display: flex; align-items: center; gap: 15px; }
        .input-pill input { background: transparent; border: none; outline: none; color: white; width: 150px; }

        .resize-handle { position: absolute; right: -5px; top: 0; width: 10px; height: 100%; cursor: col-resize; z-index: 10; display: flex; align-items: center; justify-content: center; }
        .handle-bar { width: 1px; height: 40px; background: rgba(255,255,255,0.1); }
    </style>
</head>
<body>

<svg class="hidden" style="position: absolute; width: 0; height: 0;">
    <defs>
        <filter id="container-glass"><feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="1" result="noise"/><feDisplacementMap in="SourceGraphic" in2="noise" scale="15" xChannelSelector="R" yChannelSelector="G"/></filter>
    </defs>
</svg>

<div class="gradient-bg"></div>

<header>
    <div style="font-weight: 800; font-size: 18px; letter-spacing: -1px;">TIMEBLOCK</div>
    <div id="stats" style="font-size: 10px; font-weight: 800; opacity: 0.6;">0 / 0 PLACED</div>
</header>

<main id="grid-container"></main>

<footer>
    <div id="dock-items"></div>
</footer>

<script>
    const COLORS = [
        {bg: 'rgba(99, 102, 241, 0.5)'},
        {bg: 'rgba(168, 85, 247, 0.5)'},
        {bg: 'rgba(236, 72, 153, 0.5)'},
        {bg: 'rgba(16, 185, 129, 0.5)'}
    ];

    let state = {
        widths: Array(24).fill(150),
        tasks: [],
        isEditing: false,
        tempName: ''
    };

    // --- PERSISTENCE ENGINE ---
    function saveToStorage() {
        const data = {
            tasks: state.tasks,
            widths: state.widths,
            lastDate: new Date().toDateString()
        };
        localStorage.setItem('TIMEBLOCK_APP_DATA', JSON.stringify(data));
    }

    function loadFromStorage() {
        const saved = localStorage.getItem('TIMEBLOCK_APP_DATA');
        if (saved) {
            const data = JSON.parse(saved);
            const today = new Date().toDateString();
            
            // If it's a new day, we reset tasks but keep column widths
            if (data.lastDate !== today) {
                state.tasks = [];
                state.widths = data.widths || Array(24).fill(150);
            } else {
                state.tasks = data.tasks || [];
                state.widths = data.widths || Array(24).fill(150);
            }
        }
    }

    function initGrid() {
        const grid = document.getElementById('grid-container');
        grid.innerHTML = '';
        for (let i = 0; i < 24; i++) {
            const col = document.createElement('div');
            col.className = 'hour-col';
            col.id = `col-${i}`;
            col.style.width = `${state.widths[i]}px`;
            const h = i === 0 ? '12 AM' : (i < 12 ? i + ' AM' : (i === 12 ? '12 PM' : (i-12) + ' PM'));
            col.innerHTML = `<div class="col-header">${h}</div>`;
            const dz = document.createElement('div');
            dz.className = 'drop-zone';
            dz.dataset.hour = i;
            dz.ondragover = (e) => { e.preventDefault(); dz.classList.add('drag-hover'); };
            dz.ondragleave = () => dz.classList.remove('drag-hover');
            dz.ondrop = (e) => {
                e.preventDefault();
                dz.classList.remove('drag-hover');
                updateTaskPos(e.dataTransfer.getData('text/plain'), i);
            };
            col.appendChild(dz);
            if (i < 23) {
                const rs = document.createElement('div');
                rs.className = 'resize-handle';
                rs.innerHTML = '<div class="handle-bar"></div>';
                rs.onmousedown = (e) => setupResize(e, i);
                col.appendChild(rs);
            }
            grid.appendChild(col);
        }
    }

    function syncUI() {
        document.querySelectorAll('.drop-zone').forEach(dz => dz.innerHTML = '');
        const dock = document.getElementById('dock-items');
        dock.innerHTML = '';

        state.tasks.forEach(t => {
            const el = document.createElement('div');
            el.className = 'task-bubble';
            el.style.backgroundColor = t.color.bg;
            el.draggable = true;

            const text = document.createElement('span');
            text.innerText = t.name;
            el.appendChild(text);

            const del = document.createElement('button');
            del.className = 'delete-btn';
            del.innerHTML = '✕';
            del.onclick = (e) => { e.stopPropagation(); deleteTask(t.id); };
            el.appendChild(del);

            el.ondragstart = (e) => {
                e.dataTransfer.setData('text/plain', t.id);
                setTimeout(() => el.style.opacity = '0.2', 0);
            };
            el.ondragend = () => el.style.opacity = '1';

            if (t.hour !== null) {
                const target = document.querySelector(`.drop-zone[data-hour="${t.hour}"]`);
                if (target) target.appendChild(el);
            } else {
                dock.appendChild(el);
            }
        });

        if (state.isEditing) {
            const p = document.createElement('div');
            p.className = 'input-pill';
            p.innerHTML = `<input id="tin" placeholder="Name..."><button onclick="addTask()" style="background:var(--accent-indigo);color:white;border:none;padding:5px 15px;border-radius:8px;font-weight:800;cursor:pointer;">ADD</button>`;
            dock.appendChild(p);
            const tin = document.getElementById('tin'); tin.focus();
            tin.oninput = (e) => state.tempName = e.target.value;
            tin.onkeydown = (e) => { if(e.key === 'Enter') addTask(); };
        } else {
            const btn = document.createElement('button');
            btn.className = 'btn-liquid-add';
            btn.innerText = '+ NEW TASK';
            btn.onclick = () => { state.isEditing = true; syncUI(); };
            dock.appendChild(btn);
        }
        document.getElementById('stats').innerText = `${state.tasks.filter(t => t.hour !== null).length} / ${state.tasks.length} PLACED`;
        saveToStorage();
    }

    function addTask() {
        if (!state.tempName) return;
        state.tasks.push({ id: 't'+Date.now(), name: state.tempName, hour: null, color: COLORS[state.tasks.length % COLORS.length] });
        state.tempName = ''; state.isEditing = false;
        syncUI();
    }

    function deleteTask(id) {
        state.tasks = state.tasks.filter(t => t.id !== id);
        syncUI();
    }

    function updateTaskPos(id, hour) {
        const t = state.tasks.find(x => x.id === id);
        if (t) { t.hour = hour; syncUI(); }
    }

    function setupResize(e, index) {
        const startX = e.clientX;
        const w0 = state.widths[index], w1 = state.widths[index+1], total = w0 + w1;
        const onMove = (me) => {
            const dx = me.clientX - startX;
            const nw0 = Math.max(70, Math.min(total - 70, w0 + dx));
            state.widths[index] = nw0; state.widths[index+1] = total - nw0;
            document.getElementById(`col-${index}`).style.width = nw0 + 'px';
            document.getElementById(`col-${index+1}`).style.width = (total - nw0) + 'px';
            saveToStorage(); // Save column layout too!
        };
        const onUp = () => { window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp); };
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onUp);
    }

    loadFromStorage();
    initGrid();
    syncUI();
</script>
</body>
</html>
