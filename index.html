<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeBlock | Plan Your Day</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #080c1a;
            --panel-bg: rgba(8, 12, 26, 0.97);
            --accent-indigo: #6366f1;
            --accent-purple: #a855f7;
            --text-primary: #e2e8f0;
            --text-muted: #4a6080;
            --text-faint: #334155;
            --border-subtle: #0f172a;
            --border-panel: #1e2a4a;
            --scrollbar-track: #0c1022;
            --scrollbar-thumb: #1e2a4a;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Sora', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            user-select: none;
        }

        /* --- Animations --- */
        @keyframes popIn {
            0% { transform: scale(0.7); opacity: 0; }
            70% { transform: scale(1.08); }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulseRing {
            0%, 100% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.3); }
            50% { box-shadow: 0 0 0 6px rgba(99, 102, 241, 0); }
        }

        /* --- Scrollbar --- */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--scrollbar-track); }
        ::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 10px; }

        /* --- Header --- */
        header {
            height: 60px;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-subtle);
            flex-shrink: 0;
            z-index: 30;
        }

        .logo-area { display: flex; align-items: center; gap: 12px; }
        .logo-box {
            width: 38px;
            height: 38px;
            background: linear-gradient(135deg, var(--accent-indigo), var(--accent-purple), #ec4899);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 4px 16px rgba(99, 102, 241, 0.35);
        }
        .title-group h1 { margin: 0; font-size: 17px; font-weight: 800; line-height: 1.1; }
        .title-group p { margin: 0; font-size: 10px; color: var(--text-faint); font-weight: 600; }

        .stat-badge {
            background: #0f172a;
            border: 1px solid var(--border-panel);
            border-radius: 100px;
            padding: 5px 14px;
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
        }

        /* --- Grid --- */
        #grid-container {
            flex: 1;
            display: flex;
            overflow-x: auto;
            overflow-y: hidden;
            background-color: var(--bg-deep);
        }

        .hour-col {
            position: relative;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border-subtle);
            height: 100%;
        }

        .col-header {
            position: sticky;
            top: 0;
            z-index: 10;
            background: rgba(8, 12, 26, 0.9);
            backdrop-filter: blur(4px);
            padding: 8px 10px 6px;
            border-bottom: 1px solid var(--border-subtle);
        }
        .period-emoji { font-size: 12px; display: block; margin-bottom: 2px; }
        .hour-label { font-size: 11px; font-weight: 600; }

        .drop-zone {
            flex: 1;
            padding: 6px 5px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            transition: background 0.2s, border 0.2s;
            border: 2px solid transparent;
        }
        .drop-zone:hover { background: rgba(99, 102, 241, 0.03); }
        .drop-zone.drag-over {
            background: rgba(99, 102, 241, 0.12);
            border: 2px solid var(--accent-indigo);
        }

        /* --- Resize Handles --- */
        .resize-handle {
            position: absolute;
            right: -5px;
            top: 0;
            width: 10px;
            height: 100%;
            cursor: col-resize;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .resize-bar {
            width: 2px;
            height: 36px;
            background: var(--border-panel);
            border-radius: 3px;
            transition: all 0.2s;
        }
        .resize-handle:hover .resize-bar {
            width: 4px;
            height: 56px;
            background: var(--accent-indigo);
            box-shadow: 0 0 8px rgba(99, 102, 241, 0.5);
        }

        /* --- Task Bubbles --- */
        .task-bubble {
            border-radius: 8px;
            padding: 6px 8px;
            font-size: 10px;
            font-weight: 700;
            color: white;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .dock-bubble {
            border-radius: 100px;
            padding: 9px 20px;
            font-size: 13px;
            font-weight: 700;
            color: white;
            cursor: grab;
            flex-shrink: 0;
            animation: popIn 0.3s ease;
            transition: transform 0.2s;
        }
        .dock-bubble:hover { transform: translateY(-3px) scale(1.06); }
        .dock-bubble:active { cursor: grabbing; }

        .drop-indicator {
            border: 2px dashed var(--accent-indigo);
            border-radius: 8px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-indigo);
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
        }

        /* --- Dock --- */
        footer {
            height: 80px;
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border-subtle);
            padding: 0 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            flex-shrink: 0;
            z-index: 30;
        }
        .dock-label {
            font-size: 9px;
            letter-spacing: 2px;
            color: #1e3050;
            font-weight: 800;
        }
        #dock-items {
            display: flex;
            align-items: center;
            gap: 12px;
            overflow-x: auto;
            flex: 1;
            padding: 10px 0;
        }

        .btn-new-task {
            border: 2px dashed #1e2a4a;
            border-radius: 100px;
            padding: 8px 18px;
            background: transparent;
            color: #3d4f72;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            animation: pulseRing 3s ease-in-out infinite;
            white-space: nowrap;
        }
        .btn-new-task:hover { border-color: var(--accent-indigo); color: #818cf8; }

        /* --- Input Mode --- */
        .input-pill {
            background: #0d1528;
            border: 1px solid var(--border-panel);
            border-radius: 16px;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: fadeUp 0.25s ease;
        }
        .input-fields { display: flex; flex-direction: column; }
        .input-fields input {
            background: transparent;
            border: none;
            outline: none;
            color: #cbd5e1;
            font-size: 13px;
            font-weight: 600;
            width: 140px;
            font-family: inherit;
        }
        .swatch-group { display: flex; gap: 6px; }
        .swatch {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .swatch.active { outline: 2px solid white; transform: scale(1.25); }

        /* --- Modal --- */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(10px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-card {
            background: #0c1222;
            border: 1px solid #1a2540;
            border-radius: 22px;
            padding: 28px 28px 22px;
            width: 340px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.04);
            animation: fadeUp 0.25s ease;
        }
        .modal-icon {
            width: 52px;
            height: 52px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 16px;
        }
        .note-block {
            background: #080f1e;
            border: 1px solid #1a2540;
            border-radius: 12px;
            padding: 12px 14px;
            font-size: 13px;
            color: #94a3b8;
            line-height: 1.6;
            margin: 16px 0;
        }
        .modal-btns { display: flex; gap: 10px; margin-top: 22px; }
        .btn-modal {
            flex: 1;
            padding: 11px 0;
            border-radius: 13px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <div class="logo-box">⏱</div>
            <div class="title-group">
                <h1>TimeBlock</h1>
                <p>Resize columns · Drag tasks · Plan your day</p>
            </div>
        </div>
        <div id="stat-pill" class="stat-badge">0 / 0 placed</div>
    </header>

    <main id="grid-container"></main>

    <footer>
        <div class="dock-label">Tasks</div>
        <div id="dock-items"></div>
    </footer>

    <div id="modal-container"></div>

    <script>
        // --- Configuration & State ---
        const MIN_W = 72;
        const COLORS = [
            { name: 'rose', bg: '#f43f5e', glow: '#f43f5e55' },
            { name: 'amber', bg: '#f59e0b', glow: '#f59e0b55' },
            { name: 'emerald', bg: '#10b981', glow: '#10b98155' },
            { name: 'blue', bg: '#3b82f6', glow: '#3b82f655' },
            { name: 'purple', bg: '#a855f7', glow: '#a855f755' },
            { name: 'pink', bg: '#ec4899', glow: '#ec489955' },
            { name: 'teal', bg: '#14b8a6', glow: '#14b8a655' },
            { name: 'orange', bg: '#f97316', glow: '#f9731655' },
            { name: 'indigo', bg: '#6366f1', glow: '#6366f155' },
            { name: 'lime', bg: '#84cc16', glow: '#84cc1655' }
        ];

        let state = {
            widths: Array(24).fill(112),
            tasks: [],
            isEditing: false,
            editName: '',
            editNote: '',
            activeColorIdx: 0,
            draggingId: null,
            dropHour: null,
            activeModalTask: null,
            resizing: false
        };

        // --- Helpers ---
        const $ = (id) => document.getElementById(id);
        const getHourLabel = (h) => {
            const m = h < 12 ? 'AM' : 'PM';
            const displayH = h % 12 === 0 ? 12 : h % 12;
            return `${displayH} ${m}`;
        };
        const getHourStyle = (h) => {
            if (h >= 9 && h <= 16) return '#a78bfa'; // Business
            if (h >= 6 && h <= 18) return '#4a5f8a'; // Day
            return '#2a3a5c'; // Night
        };
        const getPeriodEmoji = (h) => {
            if (h <= 5) return '🌙';
            if (h <= 11) return '🌤';
            if (h <= 17) return '☀️';
            return '🌆';
        };
        const getColumnBg = (h) => {
            if (h <= 5) return 'rgba(10,5,30,0.6)';
            if (h <= 11) return 'rgba(15,10,5,0.4)';
            if (h <= 17) return 'rgba(10,5,25,0.2)';
            return 'rgba(5,10,25,0.5)';
        };

        // --- Core Functions ---
        function render() {
            const grid = $('grid-container');
            const dock = $('dock-items');
            
            // Stats
            const placed = state.tasks.filter(t => t.hour !== null).length;
            $('stat-pill').innerText = `${placed} / ${state.tasks.length} placed`;

            // Grid
            grid.innerHTML = '';
            state.widths.forEach((w, i) => {
                const col = document.createElement('div');
                col.className = 'hour-col';
                col.style.width = `${w}px`;
                col.style.backgroundColor = getColumnBg(i);

                const header = `
                    <div class="col-header">
                        <span class="period-emoji">${getPeriodEmoji(i)}</span>
                        <span class="hour-label" style="color: ${getHourStyle(i)}">${getHourLabel(i)}</span>
                    </div>
                `;

                const dropZone = document.createElement('div');
                dropZone.className = `drop-zone ${state.dropHour === i ? 'drag-over' : ''}`;
                
                // Tasks in this hour
                state.tasks.filter(t => t.hour === i).forEach(task => {
                    const bubble = document.createElement('div');
                    bubble.className = 'task-bubble';
                    bubble.style.backgroundColor = task.color.bg;
                    bubble.innerText = task.name;
                    bubble.onclick = () => { state.activeModalTask = task; render(); };
                    dropZone.appendChild(bubble);
                });

                if (state.dropHour === i) {
                    const indicator = document.createElement('div');
                    indicator.className = 'drop-indicator';
                    indicator.innerText = 'drop here';
                    dropZone.appendChild(indicator);
                }

                // Drag Events
                dropZone.ondragover = (e) => { e.preventDefault(); if(state.dropHour !== i) { state.dropHour = i; render(); } };
                dropZone.ondragleave = () => { state.dropHour = null; render(); };
                dropZone.ondrop = (e) => {
                    const task = state.tasks.find(t => t.id === state.draggingId);
                    if (task) task.hour = i;
                    state.draggingId = null;
                    state.dropHour = null;
                    render();
                };

                col.innerHTML = header;
                col.appendChild(dropZone);

                // Resize Handle
                if (i < 23) {
                    const handle = document.createElement('div');
                    handle.className = 'resize-handle';
                    handle.innerHTML = '<div class="resize-bar"></div>';
                    handle.onmousedown = (e) => initResize(e, i);
                    col.appendChild(handle);
                }

                grid.appendChild(col);
            });

            // Dock
            dock.innerHTML = '';
            state.tasks.filter(t => t.hour === null).forEach(task => {
                const bubble = document.createElement('div');
                bubble.className = 'dock-bubble';
                bubble.draggable = true;
                bubble.innerText = task.name;
                bubble.style.backgroundColor = task.color.bg;
                bubble.style.boxShadow = `0 4px 12px ${task.color.glow}`;
                
                bubble.ondragstart = (e) => {
                    state.draggingId = task.id;
                    bubble.style.opacity = '0.35';
                    const img = new Image();
                    img.src = 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7';
                    e.dataTransfer.setDragImage(img, 0, 0);
                };
                bubble.ondragend = () => { bubble.style.opacity = '1'; };
                
                dock.appendChild(bubble);
            });

            // Add Task Logic
            if (state.isEditing) {
                const inputPill = document.createElement('div');
                inputPill.className = 'input-pill';
                inputPill.innerHTML = `
                    <div class="input-fields">
                        <input id="task-name-in" placeholder="Task name..." value="${state.editName}">
                        <input id="task-note-in" placeholder="Add note (optional)" value="${state.editNote}" style="font-size:11px; opacity:0.6">
                    </div>
                    <div class="swatch-group">
                        ${COLORS.map((c, idx) => `
                            <div class="swatch ${state.activeColorIdx === idx ? 'active' : ''}" 
                                 style="background:${c.bg}" 
                                 onclick="event.stopPropagation(); state.activeColorIdx = ${idx}; render();">
                            </div>
                        `).join('')}
                    </div>
                    <button class="btn-modal" style="background:linear-gradient(135deg, #6366f1, #8b5cf6); color:white; width:auto; padding: 8px 18px" onclick="saveTask()">Add</button>
                    <button style="background:transparent; border:none; color:#4a6080; cursor:pointer; font-size:18px" onclick="state.isEditing=false; render()">✕</button>
                `;
                dock.appendChild(inputPill);
                
                // Focus and Keys
                const nameIn = $('task-name-in');
                nameIn.focus();
                nameIn.oninput = (e) => state.editName = e.target.value;
                $('task-note-in').oninput = (e) => state.editNote = e.target.value;
                inputPill.onkeydown = (e) => {
                    if(e.key === 'Enter') saveTask();
                    if(e.key === 'Escape') { state.isEditing = false; render(); }
                };
            } else {
                const addBtn = document.createElement('button');
                addBtn.className = 'btn-new-task';
                addBtn.innerHTML = `<span>＋</span> New task`;
                addBtn.onclick = () => { state.isEditing = true; render(); };
                dock.appendChild(addBtn);
            }

            // Modal
            const modalCont = $('modal-container');
            modalCont.innerHTML = '';
            if (state.activeModalTask) {
                const task = state.activeModalTask;
                const overlay = document.createElement('div');
                overlay.className = 'modal-overlay';
                overlay.onclick = () => { state.activeModalTask = null; render(); };
                
                overlay.innerHTML = `
                    <div class="modal-card" onclick="event.stopPropagation()">
                        <div class="modal-icon" style="background:${task.color.bg}; box-shadow: 0 8px 20px ${task.color.glow}">📌</div>
                        <h2 style="margin:0; font-size:22px; font-weight:800; letter-spacing:-0.5px">${task.name}</h2>
                        <p style="margin:4px 0 0; font-size:12px; color:var(--text-muted)">
                            Scheduled · <span style="color:#a78bfa; font-weight:700">${getHourLabel(task.hour)}</span>
                        </p>
                        ${task.note ? `<div class="note-block">${task.note}</div>` : ''}
                        
                        <div class="modal-btns">
                            <button class="btn-modal" style="background:#131c35; color:#64748b" onclick="returnToDock('${task.id}')">Return to dock</button>
                            <button class="btn-modal" style="background:${task.color.bg}; color:white; box-shadow: 0 4px 12px ${task.color.glow}" onclick="state.activeModalTask=null; render()">Done</button>
                        </div>
                        <button style="width:100%; background:transparent; border:none; color:#2a3a55; font-size:12px; margin-top:16px; cursor:pointer" onclick="deleteTask('${task.id}')">Delete task</button>
                    </div>
                `;
                modalCont.appendChild(overlay);
            }
        }

        // --- Interaction Handlers ---
        function saveTask() {
            if (!state.editName.trim()) return;
            state.tasks.push({
                id: 't-' + Date.now(),
                name: state.editName,
                note: state.editNote,
                color: COLORS[state.activeColorIdx],
                hour: null
            });
            state.editName = '';
            state.editNote = '';
            state.isEditing = false;
            state.activeColorIdx = (state.activeColorIdx + 1) % COLORS.length;
            render();
        }

        function returnToDock(id) {
            const task = state.tasks.find(t => t.id === id);
            if (task) task.hour = null;
            state.activeModalTask = null;
            render();
        }

        function deleteTask(id) {
            state.tasks = state.tasks.filter(t => t.id !== id);
            state.activeModalTask = null;
            render();
        }

        function initResize(e, index) {
            state.resizing = true;
            document.body.style.cursor = 'col-resize';
            
            const startX = e.clientX;
            const leftW0 = state.widths[index];
            const rightW0 = state.widths[index + 1];
            const total = leftW0 + rightW0;

            function onMouseMove(moveEvent) {
                const dx = moveEvent.clientX - startX;
                const newLeft = Math.max(MIN_W, Math.min(total - MIN_W, leftW0 + dx));
                state.widths[index] = newLeft;
                state.widths[index + 1] = total - newLeft;
                render();
            }

            function onMouseUp() {
                state.resizing = false;
                document.body.style.cursor = 'default';
                document.removeEventListener('mousemove', onMouseMove);
                document.removeEventListener('mouseup', onMouseUp);
            }

            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mouseup', onMouseUp);
        }

        // Initial Render
        render();
    </script>
</body>
</html>
